<!DOCTYPE html>
<HTML lang="en">
<HEAD>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"0>
    <title>Random Quote Generator</title>
    <link rel="stylesheet" href="styles.css">
</HEAD>
<body>
    <main class="quote-container">
        <h1 class="application-title">Daily Inspiration</h1>
        <div class="quote-display-area">
            <p id="quoteText" class="quote-text">"Click the button for a new quote!"</p>
            <p id="authorText" class="author-text">- Author</p>
        </div>
        <button id="generateQuoteButton" class="generate-button">Get New Quote</button>
        <p id="errorMessage" class="error-message"></p>
    </main>
    <script src="script.js"></script>
</body>
</HTML>
